<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Consultas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>⚖️ Central de Consultas</h1>

        <p>
            Consulta rápida de Modelos, Contatos e Convênios
        </p>

    </header>

    <div class="abas">

        <button class="aba ativa" onclick="trocarAba('modelos')">
            📄 Modelos
        </button>

        <button class="aba" onclick="trocarAba('contatos')">
            📧 Contatos
        </button>

        <button class="aba" onclick="trocarAba('convenios')">
            🏢 Convênios
        </button>

    </div>

    <div class="container">

        <input
            type="text"
            id="busca"
            placeholder="Digite sua pesquisa..."
        >

        <div id="resultados"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
