<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Consultas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img
            src="logo-diretoria.jpeg"
            class="logo"
            alt="Diretoria Criminal Especializada"
        >

        <h1>Central de Consultas</h1>

        <p>
            Diretoria Criminal Especializada
        </p>
    </header>

    <div class="abas">
        <button
            type="button"
            class="aba"
            onclick="trocarAba('favoritos', this)">
            &#9733; Favoritos
        </button>

        <button
            type="button"
            class="aba ativa"
            onclick="trocarAba('analise', this)">
            &#128196; Modelos - Análise e Cumprimento
        </button>

        <button
            type="button"
            class="aba"
            onclick="trocarAba('possentenca', this)">
            &#9878; Modelos - Pós-Sentença
        </button>

        <button
            type="button"
            class="aba"
            onclick="trocarAba('contatos', this)">
            &#128231; Contatos
        </button>

        <button
            type="button"
            class="aba"
            onclick="trocarAba('convenios', this)">
            &#127970; Convênios
        </button>
    </div>

    <main class="container">
        <section class="painel-controles" aria-label="Controles de pesquisa">
            <div class="linha-pesquisa">
                <input
                    type="text"
                    id="busca"
                    placeholder="Digite sua pesquisa..."
                >

                <button
                    type="button"
                    id="limparBusca"
                    class="botao-secundario">
                    Limpar
                </button>
            </div>

            <div class="linha-filtros">
                <div class="grupo-filtro">
                    <label for="filtroCategoria">
                        Categoria
                    </label>

                    <select id="filtroCategoria">
                        <option value="">
                            Todas as categorias
                        </option>
                    </select>
                </div>

                <div class="resumo-acoes">
                    <p id="contadorResultados" class="contador-resultados">
                        Carregando...
                    </p>

                    <button
                        type="button"
                        id="modoCompacto"
                        class="botao-secundario"
                        aria-pressed="false">
                        Modo compacto
                    </button>
                </div>
            </div>
        </section>

        <div id="resultados"></div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js?v=20260716-convenios-xlsx"></script>

</body>

</html>
