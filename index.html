<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Consultas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <img
            src="logo-diretoria.jpeg"
            class="logo"
            alt="Diretoria Criminal Especializada"
            style="width:120px;"
        >

        <h1>Central de Consultas</h1>

        <p>
            Diretoria Criminal Especializada
        </p>

    </header>

    <div class="abas">

        <button
            class="aba"
            onclick="trocarAba('favoritos', this)">

            ⭐ Favoritos

        </button>

        <button
            class="aba ativa"
            onclick="trocarAba('analise', this)">

            📄 Modelos - Análise e Cumprimento

        </button>

        <button
            class="aba"
            onclick="trocarAba('possentenca', this)">

            ⚖️ Modelos - Pós-Sentença

        </button>

        <button
            class="aba"
            onclick="trocarAba('contatos', this)">

            📧 Contatos

        </button>

        <button
            class="aba"
            onclick="trocarAba('convenios', this)">

            🏢 Convênios

        </button>

    </div>

    <div class="container">

        <input
            type="text"
            id="busca"
            placeholder="Digite sua pesquisa..."
        >

        <div id="resultados"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
